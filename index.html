<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Volúmenes</title>
  <style>
    :root {
  --color-accent:     #1a3c6e;
  --color-accent-lt:  #e8eef6;
  --color-bg:         #ffffff;
  --color-surface:    #f5f6f8;
  --color-border:     #dde1e8;
  --color-text:       #1a1a2e;
  --color-muted:      #6b7280;
  --color-error:      #dc2626;
  --color-row-alt:    #f9fafb;
  --radius:           8px;
  --font:             system-ui, -apple-system, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  color: var(--color-text);
  background: var(--color-bg);
  padding: 24px 16px;
  max-width: 720px;
  margin: 0 auto;
}

h2 {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--color-accent);
}

/* FORMULARIO */
#form-section {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
}

.form-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}

.field { display: flex; flex-direction: column; gap: 4px; }

.dims-row {
  display: flex;
  gap: 12px;
}

.dim-field {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

@media (max-width: 479px) {
  .dims-row { flex-wrap: wrap; }
  .dim-field { flex: 1 1 calc(33% - 8px); min-width: 80px; }
}

label {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--color-muted);
}

input[type="text"],
input[type="number"],
select {
  padding: 10px 12px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  font-size: 1rem;
  font-family: var(--font);
  background: var(--color-bg);
  width: 100%;
  transition: border-color 0.15s;
}

select { cursor: pointer; }

input:focus,
select:focus {
  outline: none;
  border-color: var(--color-accent);
}

input.input-error,
select.input-error { border-color: var(--color-error); }

.field-error {
  font-size: 0.75rem;
  color: var(--color-error);
  min-height: 1em;
}

#btn-agregar {
  padding: 11px 24px;
  background: var(--color-accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

#btn-agregar:hover { opacity: 0.88; }

/* LISTA */
#list-section {
  margin-bottom: 24px;
}

#empty-state {
  text-align: center;
  color: var(--color-muted);
  padding: 32px 16px;
  border: 2px dashed var(--color-border);
  border-radius: var(--radius);
  font-size: 0.95rem;
}

#items-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}

#items-table thead th {
  text-align: left;
  padding: 10px 12px;
  background: var(--color-surface);
  border-bottom: 2px solid var(--color-border);
  font-size: 0.8rem;
  color: var(--color-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

#items-table tbody tr:nth-child(even) { background: var(--color-row-alt); }

#items-table tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--color-border);
  vertical-align: middle;
}

.btn-delete {
  background: none;
  border: none;
  color: var(--color-muted);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}

.btn-delete:hover { color: var(--color-error); background: #fef2f2; }

/* RESULTADO */
#result-section {
  background: var(--color-accent-lt);
  border: 1px solid var(--color-accent);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#result-total {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--color-accent);
}

#result-recommendation {
  font-size: 1rem;
  color: var(--color-text);
}

/* INFO BODEGAS */
.bodegas-info {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 24px;
  padding: 14px 16px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
}

.bodega-badge {
  font-size: 0.75rem;
  color: var(--color-muted);
  white-space: nowrap;
}

.bodega-badge strong {
  color: var(--color-accent);
  font-weight: 600;
}

/* FOOTER */
.site-footer {
  border-top: 1px solid var(--color-border);
  background: var(--color-surface);
  padding: 16px;
  text-align: center;
  font-size: 0.75rem;
  color: var(--color-muted);
  margin-top: 24px;
  line-height: 1.8;
}

.site-footer a { color: var(--color-accent); }
  </style>
</head>
<body>

  <!-- ZONA 1: FORMULARIO -->
  <section id="form-section">
    <h2>¿Qué necesitas guardar?</h2>
    <div class="form-grid">
      <div class="field">
        <label for="item-preset">Artículo</label>
        <select id="item-preset">
          <option value="" disabled selected>— Selecciona un artículo —</option>
        </select>
        <span class="field-error" id="error-preset"></span>
      </div>
      <div class="field" id="field-name" style="display:none">
        <label for="item-name">Nombre del artículo</label>
        <input type="text" id="item-name" placeholder="Ej: Caja de herramientas" />
      </div>
      <div class="dims-row">
        <div class="dim-field">
          <label for="item-largo">Largo (cm)</label>
          <input type="number" id="item-largo" min="0.01" step="any" placeholder="0" />
          <span class="field-error" id="error-largo"></span>
        </div>
        <div class="dim-field">
          <label for="item-ancho">Ancho (cm)</label>
          <input type="number" id="item-ancho" min="0.01" step="any" placeholder="0" />
          <span class="field-error" id="error-ancho"></span>
        </div>
        <div class="dim-field">
          <label for="item-alto">Alto (cm)</label>
          <input type="number" id="item-alto" min="0.01" step="any" placeholder="0" />
          <span class="field-error" id="error-alto"></span>
        </div>
      </div>
    </div>
    <button id="btn-agregar" type="button">+ Agregar item</button>
  </section>

  <!-- ZONA 2: LISTA -->
  <section id="list-section">
    <h2>Items agregados</h2>
    <div id="empty-state">Agrega tu primer item para comenzar</div>
    <table id="items-table" style="display:none">
      <thead>
        <tr>
          <th>Item</th>
          <th>Dimensiones (cm)</th>
          <th>Volumen</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="items-tbody"></tbody>
    </table>
  </section>

  <!-- ZONA 3: RESULTADO -->
  <section id="result-section" style="display:none">
    <div id="result-total"></div>
    <div id="result-recommendation"></div>
  </section>

  <!-- INFO BODEGAS -->
  <div class="bodegas-info">
    <span class="bodega-badge"><strong>Bodega Pequeña</strong> — hasta 3 m³</span>
    <span class="bodega-badge">·</span>
    <span class="bodega-badge"><strong>Bodega Mediana</strong> — hasta 8 m³</span>
    <span class="bodega-badge">·</span>
    <span class="bodega-badge"><strong>Bodega Grande</strong> — más de 8 m³</span>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Desarrollado por Rony Romero · Todos los derechos reservados © 2026</p>
    <p>Impulsado por <a href="https://www.astrolab.com.co/" target="_blank" rel="noopener">Astrolab</a></p>
  </footer>

  <script>
    // ─── CONFIGURACIÓN DEL NEGOCIO ────────────────────────────────────────────
    const STORAGE_UNITS = [
      { name: 'Bodega Pequeña', maxVolume: 3 },
      { name: 'Bodega Mediana', maxVolume: 8 },
      { name: 'Bodega Grande',  maxVolume: Infinity },
    ];

    const PREDEFINED_ITEMS = [
      { name: 'TV 32" en caja',          largo: 75,  ancho: 15,  alto: 45  },
      { name: 'TV 50" en caja',          largo: 115, ancho: 15,  alto: 70  },
      { name: 'TV 65" en caja',          largo: 150, ancho: 18,  alto: 85  },
      { name: 'Sofá 3 puestos',          largo: 200, ancho: 90,  alto: 85  },
      { name: 'Cama matrimonial',        largo: 200, ancho: 160, alto: 40  },
      { name: 'Armario/Closet',          largo: 120, ancho: 60,  alto: 200 },
      { name: 'Mesa comedor 6 puestos',  largo: 180, ancho: 90,  alto: 75  },
      { name: 'Escritorio de oficina',   largo: 120, ancho: 60,  alto: 75  },
      { name: 'Refrigerador',            largo: 70,  ancho: 70,  alto: 170 },
      { name: 'Lavadora automática',     largo: 65,  ancho: 65,  alto: 85  },
      { name: 'Caja de cartón estándar', largo: 60,  ancho: 40,  alto: 40  },
      { name: 'Colchón matrimonial',     largo: 190, ancho: 140, alto: 25  },
      { name: 'Bicicleta',               largo: 180, ancho: 60,  alto: 100 },
      { name: 'Silla de oficina',        largo: 65,  ancho: 65,  alto: 110 },
      { name: 'Estantería metálica',     largo: 180, ancho: 45,  alto: 180 },
    ];

    const SESSION_KEY = 'calculadora_items';

    // ─── ESTADO ───────────────────────────────────────────────────────────────
    let items = [];      // [{ id, name, largo, ancho, alto, volume }]
    let itemCounter = 0; // contador incremental, nunca retrocede

    // ─── LÓGICA DE CÁLCULO ────────────────────────────────────────────────────
    function calcVolume(largo, ancho, alto) {
      return (largo * ancho * alto) / 1_000_000;
    }

    function calcTotal(itemList) {
      return itemList.reduce((sum, it) => sum + it.volume, 0);
    }

    function getRecommendation(totalM3) {
      const unit = STORAGE_UNITS.find(u => totalM3 <= u.maxVolume);
      return unit ? unit.name : STORAGE_UNITS[STORAGE_UNITS.length - 1].name;
    }

    // ─── PERSISTENCIA (sessionStorage) ────────────────────────────────────────
    function saveSession() {
      try {
        sessionStorage.setItem(SESSION_KEY, JSON.stringify({ items, itemCounter }));
      } catch (_) { /* storage unavailable — state lives only in memory */ }
    }

    function loadSession() {
      const raw = sessionStorage.getItem(SESSION_KEY);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        items = data.items || [];
        itemCounter = data.itemCounter || 0;
      } catch (_) {
        items = [];
        itemCounter = 0;
      }
    }

    // ─── RENDERIZADO ──────────────────────────────────────────────────────────
    function renderList() {
      const tbody    = document.getElementById('items-tbody');
      const table    = document.getElementById('items-table');
      const empty    = document.getElementById('empty-state');

      if (items.length === 0) {
        table.style.display = 'none';
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        table.style.display = 'table';
        tbody.innerHTML = items.map(it => `
          <tr>
            <td>${escapeHtml(it.name)}</td>
            <td>${it.largo} × ${it.ancho} × ${it.alto} cm</td>
            <td>${it.volume.toFixed(2)} m³</td>
            <td><button class="btn-delete" data-id="${it.id}" title="Eliminar">×</button></td>
          </tr>
        `).join('');
      }
    }

    function renderResult() {
      const section = document.getElementById('result-section');
      const total   = document.getElementById('result-total');
      const rec     = document.getElementById('result-recommendation');

      if (items.length === 0) {
        section.style.display = 'none';
        return;
      }

      const totalM3 = calcTotal(items);
      const recName = getRecommendation(totalM3);

      section.style.display = 'flex';
      total.textContent = `Volumen total: ${totalM3.toFixed(2)} m³`;
      rec.textContent   = `Bodega recomendada: ${recName}`;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function render() {
      renderList();
      renderResult();
    }

    // ─── EVENTOS ──────────────────────────────────────────────────────────────
    function validateForm(preset, largo, ancho, alto) {
      const errors = {};
      const ok = v => Number.isFinite(Number(v)) && Number(v) > 0;
      if (!preset) errors.preset = 'Selecciona un artículo';
      if (!ok(largo)) errors.largo = 'Ingresa un valor mayor a 0';
      if (!ok(ancho))  errors.ancho  = 'Ingresa un valor mayor a 0';
      if (!ok(alto))   errors.alto   = 'Ingresa un valor mayor a 0';
      return errors;
    }

    function showErrors(errors) {
      ['largo', 'ancho', 'alto'].forEach(field => {
        const input = document.getElementById(`item-${field}`);
        const span  = document.getElementById(`error-${field}`);
        if (errors[field]) {
          input.classList.add('input-error');
          span.textContent = errors[field];
        } else {
          input.classList.remove('input-error');
          span.textContent = '';
        }
      });

      const presetEl  = document.getElementById('item-preset');
      const presetErr = document.getElementById('error-preset');
      if (errors.preset) {
        presetEl.classList.add('input-error');
        presetErr.textContent = errors.preset;
      } else {
        presetEl.classList.remove('input-error');
        presetErr.textContent = '';
      }
    }

    function onPresetChange() {
      const presetEl  = document.getElementById('item-preset');
      const fieldName = document.getElementById('field-name');
      const val = presetEl.value;

      document.getElementById('error-preset').textContent = '';
      presetEl.classList.remove('input-error');

      if (val === '__otro__') {
        fieldName.style.display = 'block';
        document.getElementById('item-largo').value = '';
        document.getElementById('item-ancho').value = '';
        document.getElementById('item-alto').value  = '';
      } else if (val === '') {
        fieldName.style.display = 'none';
        document.getElementById('item-largo').value = '';
        document.getElementById('item-ancho').value = '';
        document.getElementById('item-alto').value  = '';
      } else {
        fieldName.style.display = 'none';
        const preset = PREDEFINED_ITEMS.find(p => p.name === val);
        if (preset) {
          document.getElementById('item-largo').value = preset.largo;
          document.getElementById('item-ancho').value = preset.ancho;
          document.getElementById('item-alto').value  = preset.alto;
        }
      }
    }

    function clearErrors() {
      showErrors({});
    }

    function onAgregar() {
      const presetEl   = document.getElementById('item-preset');
      const nameInput  = document.getElementById('item-name');
      const largoInput = document.getElementById('item-largo');
      const anchoInput = document.getElementById('item-ancho');
      const altoInput  = document.getElementById('item-alto');

      const presetVal = presetEl.value;
      const largoVal  = largoInput.value.trim();
      const anchoVal  = anchoInput.value.trim();
      const altoVal   = altoInput.value.trim();

      const errors = validateForm(presetVal, largoVal, anchoVal, altoVal);
      showErrors(errors);
      if (Object.keys(errors).length > 0) return;

      itemCounter += 1;
      const name = presetVal === '__otro__'
        ? (nameInput.value.trim() || `Item ${itemCounter}`)
        : presetVal;

      const largo  = parseFloat(largoVal);
      const ancho  = parseFloat(anchoVal);
      const alto   = parseFloat(altoVal);
      const volume = calcVolume(largo, ancho, alto);

      items.push({ id: itemCounter, name, largo, ancho, alto, volume });

      presetEl.value   = '';
      nameInput.value  = '';
      largoInput.value = '';
      anchoInput.value = '';
      altoInput.value  = '';
      document.getElementById('field-name').style.display = 'none';
      clearErrors();

      saveSession();
      render();
    }

    function onEliminar(id) {
      items = items.filter(it => it.id !== id);
      saveSession();
      render();
    }

    function onTableClick(e) {
      const btn = e.target.closest('.btn-delete');
      if (!btn) return;
      const id = Number(btn.dataset.id);
      onEliminar(id);
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────
    function populatePreset() {
      const sel = document.getElementById('item-preset');
      PREDEFINED_ITEMS.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item.name;
        opt.textContent = item.name;
        sel.appendChild(opt);
      });
      const otro = document.createElement('option');
      otro.value = '__otro__';
      otro.textContent = 'Otro (ingresar manualmente)';
      sel.appendChild(otro);
    }

    function init() {
      populatePreset();
      loadSession();
      render();
      document.getElementById('item-preset').addEventListener('change', onPresetChange);
      document.getElementById('btn-agregar').addEventListener('click', onAgregar);
      document.getElementById('items-tbody').addEventListener('click', onTableClick);
      document.getElementById('form-section').addEventListener('keydown', e => { if (e.key === 'Enter') onAgregar(); });
    }

    init();
  </script>
</body>
</html>
